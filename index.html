<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <meta name="theme-color" content="#0f4c5c">
    <title>Luyện tập sắp xếp từ - Quản lý lớp học</title>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
            padding: 8px;
            background: #f1f5f9;
        }

        body.dark {
            background: #0f172a;
            color: #e2e8f0;
        }

        /* Container chính */
        .container, .app-container {
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(4px);
            border-radius: 1.5rem;
            padding: 1rem;
            width: 100%;
            max-width: 1000px;
            margin: 0 auto;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
        }

        body.dark .container,
        body.dark .app-container {
            background: #1e293b;
            color: #e2e8f0;
        }

        /* Top bar */
        .top-bar {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
            background: white;
            padding: 0.6rem 1rem;
            border-radius: 2rem;
            margin-bottom: 1rem;
        }
        body.dark .top-bar { background: #334155; }
        body.dark .top-bar span, body.dark .top-bar button { color: #e2e8f0; }

        /* Nút bấm */
        .btn {
            background: #f0f4f8;
            border: none;
            padding: 0.5rem 0.9rem;
            border-radius: 2rem;
            font-weight: 600;
            font-size: 0.8rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            transition: 0.2s;
            white-space: nowrap;
        }
        .btn-primary {
            background: #0f4c5c;
            color: white;
        }
        .btn-outline {
            border: 1px solid #0f4c5c;
            color: #0f4c5c;
            background: transparent;
        }
        body.dark .btn-outline {
            border-color: #94a3b8;
            color: #94a3b8;
        }
        body.dark .btn-primary {
            background: #0f4c5c;
            color: white;
        }

        /* Input */
        .input-group {
            margin-bottom: 1rem;
        }
        .input-group label {
            font-weight: 600;
            font-size: 0.8rem;
            display: block;
            margin-bottom: 4px;
            color: #0f4c5c;
        }
        body.dark .input-group label { color: #94a3b8; }
        input, select, textarea {
            width: 100%;
            padding: 0.6rem 1rem;
            border-radius: 2rem;
            border: 1px solid #cbd5e1;
            font-size: 0.85rem;
            background: #f8fafc;
        }
        body.dark input, body.dark select, body.dark textarea {
            background: #0f172a;
            border-color: #475569;
            color: #e2e8f0;
        }

        .hidden { display: none; }
        .flex-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
        }

        /* Tab bar */
        .tab-bar {
            display: flex;
            flex-wrap: nowrap;
            overflow-x: auto;
            gap: 6px;
            padding-bottom: 6px;
            margin-bottom: 1rem;
            scrollbar-width: thin;
            border-bottom: 1px solid #e2e8f0;
        }
        .tab-btn {
            background: none;
            border: none;
            padding: 0.5rem 1rem;
            font-weight: 600;
            font-size: 0.8rem;
            border-radius: 2rem;
            color: #475569;
            white-space: nowrap;
            cursor: pointer;
        }
        body.dark .tab-btn { color: #cbd5e1; }
        .tab-btn.active {
            background: #0f4c5c;
            color: white;
        }

        .tab-pane {
            display: none;
        }
        .tab-pane.active {
            display: block;
        }

        .item-card {
            background: #f8fafc;
            border-radius: 1rem;
            padding: 0.7rem;
            margin-bottom: 0.7rem;
            border: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        body.dark .item-card {
            background: #334155;
            border-color: #475569;
            color: #e2e8f0;
        }

        /* Teacher section */
        .teacher-section {
            background: white;
            border-radius: 1.5rem;
            padding: 1rem;
            margin-bottom: 1rem;
        }
        body.dark .teacher-section {
            background: #1e293b;
        }

        /* ========== GIAO DIỆN HỌC SINH ========== */
        .student-section {
            background: white;
            border-radius: 1.5rem;
            padding: 1rem;
        }
        body.dark .student-section { background: #1e293b; }

        /* Hàng nút chức năng */
        .action-row {
            display: flex;
            flex-wrap: nowrap;
            justify-content: space-between;
            gap: 6px;
            margin: 12px 0;
            overflow-x: auto;
            padding-bottom: 4px;
        }
        .action-row .btn {
            flex: 1;
            justify-content: center;
            padding: 8px 6px;
            font-size: 0.7rem;
            white-space: nowrap;
            min-width: 60px;
        }

        /* Khu vực câu hỏi - cuộn ngang */
        .questions-scroll {
            overflow-x: auto;
            white-space: nowrap;
            padding: 4px 0 8px;
            margin: 6px 0;
            -webkit-overflow-scrolling: touch;
        }
        .questions-wrapper {
            display: inline-flex;
            gap: 10px;
        }
        .q-wrapper {
            background: #eef2ff;
            border-radius: 2rem;
            padding: 5px 14px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8rem;
        }
        body.dark .q-wrapper { background: #334155; }
        .q-star {
            font-size: 1rem;
            cursor: pointer;
            color: #fbbf24;
        }

        /* Grid từ vựng - 2 cột */
        .wordbank-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            background: #f8fafc;
            border-radius: 1rem;
            padding: 10px;
            margin: 10px 0;
            border: 1px dashed #cbd5e1;
        }
        body.dark .wordbank-grid {
            background: #0f172a;
            border-color: #475569;
        }
        .word-token {
            background: white;
            border: 1px solid #cbd5e1;
            border-radius: 2rem;
            padding: 6px 10px;
            font-size: 0.8rem;
            font-weight: 500;
            text-align: center;
            cursor: grab;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            word-break: break-word;
            white-space: normal;
        }
        body.dark .word-token {
            background: #1e293b;
            border-color: #475569;
            color: #e2e8f0;
        }
        .word-token:active { cursor: grabbing; }
        .word-token.used {
            background: #0f4c5c;
            color: white;
            border-color: #0f4c5c;
        }
        .speak-icon {
            background: #e2e8f0;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 0.65rem;
            cursor: pointer;
        }
        body.dark .speak-icon { background: #475569; color: white; }

        /* Sentence builder - thanh trượt ngang */
        .builder-scroll {
            overflow-x: auto;
            white-space: nowrap;
            background: #f0fdf4;
            border-radius: 1rem;
            padding: 12px 8px;
            margin: 10px 0;
            border: 1px dashed #0f4c5c;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: thin;
            min-height: 65px;
            display: flex;
            align-items: center;
        }
        body.dark .builder-scroll {
            background: #1e293b;
            border-color: #0f4c5c;
        }
        .builder-inner {
            display: inline-flex;
            gap: 10px;
            align-items: center;
            flex-wrap: nowrap;
        }
        .builder-inner .word-token {
            display: inline-flex;
            white-space: nowrap;
            cursor: grab;
        }

        .attempt-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.75rem;
        }
        .attempt-dot {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #cbd5e1;
        }
        .attempt-dot.failed { background: #ef4444; }

        .answer-reveal-box {
            background: #e0f2fe;
            border-radius: 1rem;
            padding: 8px 10px;
            margin: 10px 0;
            font-size: 0.75rem;
        }
        body.dark .answer-reveal-box { background: #0c4a6e; color: white; }
        .meaning-permanent {
            background: #d9f0ec;
            border-radius: 1rem;
            padding: 8px 12px;
            margin: 10px 0;
            border-left: 4px solid #0f4c5c;
            font-size: 0.8rem;
        }
        body.dark .meaning-permanent { background: #134e4a; color: #e2e8f0; border-left-color: #2dd4bf; }
        .progress-track {
            height: 5px;
            background: #e2e8f0;
            border-radius: 10px;
            margin: 8px 0;
        }
        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #2563eb, #06b6d4);
            border-radius: 10px;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 70px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            border-radius: 2rem;
            padding: 6px 16px;
            display: flex;
            gap: 8px;
            z-index: 1100;
            border-left: 5px solid;
            font-size: 0.8rem;
        }
        body.dark .toast { background: #334155; color: white; }
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
        .modal-content {
            background: white;
            border-radius: 1.5rem;
            padding: 1rem;
            width: 92%;
            max-height: 80vh;
            overflow-y: auto;
        }
        body.dark .modal-content { background: #1e293b; color: #e2e8f0; }

        /* Mobile responsive */
        @media (max-width: 720px) {
            body { padding: 6px; }
            .container, .app-container { padding: 12px; border-radius: 20px; }
            .top-bar { border-radius: 18px; }
            .wordbank-grid { gap: 6px; padding: 8px; }
            .word-token { font-size: 0.75rem; padding: 5px 8px; }
            .action-row { gap: 4px; }
            .action-row .btn { font-size: 0.65rem; padding: 6px 4px; }
            .tab-bar { gap: 4px; }
            .tab-btn { padding: 0.4rem 0.8rem; font-size: 0.7rem; }
        }
    </style>
</head>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCuLjjl7fRGQO9DVPtDNOCPtpCD0rYsNNA",
        authDomain: "alichinese01.firebaseapp.com",
        projectId: "alichinese01",
        storageBucket: "alichinese01.firebasestorage.app",
        messagingSenderId: "179521071476",
        appId: "1:179521071476:web:8a90dbe85518c692306421"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let currentUser = null, isTeacher = false;
    let classes = [], exercises = [], progress = {};
    let currentStudent = null;
    let currentExerciseId = null, currentQuestionIndex = 0, currentQuestionObj = null;
    let remainingWords = [], answerWords = [];
    let currentSelectedClassId = null;
    let sortableBank = null, sortableBuilder = null;

    function escapeHtml(s) { return String(s).replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' })[m]); }
    function showToast(msg, type) {
        const old = document.querySelector('.toast'); if (old) old.remove();
        const t = document.createElement('div'); t.className = `toast ${type}`; t.innerHTML = `<span>${type==='correct'?'✅':'❌'}</span><span>${msg}</span>`;
        document.body.appendChild(t); setTimeout(() => t.remove(), 2500);
    }
    function speakText(text) { if (!window.speechSynthesis) return; window.speechSynthesis.cancel(); const u = new SpeechSynthesisUtterance(text); u.lang = /[\u4e00-\u9fff]/.test(text) ? 'zh-CN' : 'vi-VN'; u.rate = 0.9; speechSynthesis.speak(u); }

    // Chế độ mobile/desktop
    let currentDevice = localStorage.getItem('device_theme') || 'desktop';
    function applyDeviceTheme(device) { if (device === 'mobile') document.body.classList.add('mobile-mode'); else document.body.classList.remove('mobile-mode'); localStorage.setItem('device_theme', device); }
    function setDeviceTheme(device) {
        applyDeviceTheme(device);
        const desktopBtn = document.getElementById('themeDesktopAuthBtn'), mobileBtn = document.getElementById('themeMobileAuthBtn');
        if (desktopBtn && mobileBtn) {
            if (device === 'mobile') { mobileBtn.classList.add('btn-primary'); mobileBtn.classList.remove('btn-outline'); desktopBtn.classList.add('btn-outline'); desktopBtn.classList.remove('btn-primary'); }
            else { desktopBtn.classList.add('btn-primary'); desktopBtn.classList.remove('btn-outline'); mobileBtn.classList.add('btn-outline'); mobileBtn.classList.remove('btn-primary'); }
        }
    }
    document.getElementById('themeDesktopAuthBtn')?.addEventListener('click', () => setDeviceTheme('desktop'));
    document.getElementById('themeMobileAuthBtn')?.addEventListener('click', () => setDeviceTheme('mobile'));
    applyDeviceTheme(currentDevice);

    // ========== DỮ LIỆU ==========
    async function loadDataFromFirestore() {
        try {
            const doc = await db.collection('app_config').doc('main').get();
            if (doc.exists) { const d = doc.data(); classes = d.classes || []; exercises = d.exercises || []; progress = d.progress || {}; }
            else { initDefaultData(); await saveToCloud(); }
            normalize(); saveToLocalCache();
        } catch(e) { loadFromLocalCache(); }
    }
    function initDefaultData() {
        classes = [{ id: 1001, name: "Lớp 6A", students: [{ email: "student1@example.com", name: "Minh Anh" }], exerciseIds: [1] }];
        exercises = [{ id: 1, title: "Bài 1", questions: [

    async function saveToCloud() { try { await db.collection('app_config').doc('main').set({ classes, exercises, progress }); } catch(e){} }
    function saveToLocalCache() { localStorage.setItem('word_order_local', JSON.stringify({ classes, exercises, progress })); }
    function loadFromLocalCache() { const raw = localStorage.getItem('word_order_local'); if (raw) try { const d = JSON.parse(raw); classes = d.classes||[]; exercises = d.exercises||[]; progress = d.progress||{}; } catch(e){} }
    function normalize() {
        exercises.forEach(ex => { ex.questions.forEach(q => { if (!q.words || q.words.length===0) q.words = q.text.split(/\s+/); if (!q.grammar) q.grammar=''; if (!q.explanation) q.explanation=''; if (!q.meaning) q.meaning=''; }); });
        classes.forEach(c => { if (!c.students) c.students = []; if (!c.exerciseIds) c.exerciseIds = []; });
    }

    // Starred
    function getStarredMap() {
        if (!currentStudent) return {};
        const cn = currentStudent.className, sn = currentStudent.studentName;
        if (!progress[cn]) progress[cn] = {};
        if (!progress[cn][sn]) progress[cn][sn] = {};
        if (!progress[cn][sn].starred) progress[cn][sn].starred = {};
        return progress[cn][sn].starred;
    }
    function setStarred(qid, starred) { const s = getStarredMap(); if (starred) s[qid]=true; else delete s[qid]; saveToCloud(); }
    function isStarred(qid) { return !!getStarredMap()[qid]; }
    function resetQuestionIfWasCorrect(qid) {
        if (!currentStudent) return false;
        const cn = currentStudent.className, sn = currentStudent.studentName;
        const qd = progress[cn]?.[sn]?.[currentExerciseId]?.[qid];
        if (qd && qd.correct === true) {
            progress[cn][sn][currentExerciseId][qid] = { completed:0, correct:false, startTime:new Date() };
            saveToCloud(); showToast("⚠️ Reset câu (trước đó đã đúng)", "correct"); return true;
        }
        return false;
    }

    // HỌC SINH
    function loadStudentExercises() {
        if (!currentStudent) return;
        const cls = classes.find(c => c.name === currentStudent.className);
        if (!cls) return;
        const exSel = document.getElementById('exerciseSelect'); exSel.innerHTML = '<option value="">-- Chọn bài --</option>';
        cls.exerciseIds.forEach(eid => { const ex = exercises.find(e => e.id === eid); if (ex) { const o = document.createElement('option'); o.value = ex.id; o.textContent = `${ex.title} (${ex.questions.length})`; exSel.appendChild(o); } });
        if (cls.exerciseIds.length) { exSel.value = cls.exerciseIds[0]; loadExercise(parseInt(exSel.value)); }
        exSel.onchange = (e) => { if (e.target.value) loadExercise(parseInt(e.target.value)); };
    }
    function loadExercise(exId) {
        currentExerciseId = exId; currentQuestionIndex = 0;
        const ex = exercises.find(e => e.id === exId);
        if (ex && ex.questions.length) { renderQButtons(ex); loadQuestion(0); }
        document.getElementById('answerRevealBox').classList.add('hidden');
        initSortable();
    }
    function loadQuestion(idx) {
        const ex = exercises.find(e => e.id === currentExerciseId);
        if (!ex || idx < 0 || idx >= ex.questions.length) return;
        currentQuestionIndex = idx;
        const q = ex.questions[idx];
        currentQuestionObj = q;
        remainingWords = shuffleArray([...q.words]);
        answerWords = [];
        renderGame();
        document.getElementById('vietnameseMeaningText').innerText = q.meaning || '(chưa có)';
        document.getElementById('grammarText').innerHTML = q.grammar || '';
        document.getElementById('grammarBox').classList.toggle('hidden', !q.grammar);
        document.getElementById('statusMsg').innerHTML = `Câu ${idx+1}/${ex.questions.length}`;
        renderQButtons(ex);
        const prog = progress[currentStudent.className]?.[currentStudent.studentName]?.[currentExerciseId]?.[q.id];
        const completed = prog?.completed || 0;
        const isCorrect = prog?.correct || false;
        if (isCorrect || completed >= 3) {
            document.getElementById('correctAnswerText').innerText = q.text;
            document.getElementById('meaningText').innerText = q.meaning || '';
            document.getElementById('explanationText').innerText = q.explanation || '';
            document.getElementById('answerRevealBox').classList.remove('hidden');
        } else document.getElementById('answerRevealBox').classList.add('hidden');
        const dots = document.getElementById('attemptDotsContainer'); dots.innerHTML = '';
        for (let i=0;i<3;i++) { const d = document.createElement('span'); d.className = 'attempt-dot'; if (i<completed) d.classList.add('failed'); dots.appendChild(d); }
        const fill = document.getElementById('questionProgressFill'); fill.style.width = `${((idx+1)/ex.questions.length)*100}%`;
        document.getElementById('prevQuestionBtn').disabled = idx === 0;
        document.getElementById('nextQuestionBtn').disabled = idx === ex.questions.length-1;
        initSortable();
    }
    function shuffleArray(arr) { return [...arr].sort(() => Math.random() - 0.5); }
    function renderGame() {
        const bankGrid = document.getElementById('wordBank'); bankGrid.innerHTML = '';
        remainingWords.forEach(w => {
            const token = document.createElement('div'); token.className = 'word-token';
            token.innerHTML = `${escapeHtml(w)} <span class="speak-icon">🔊</span>`;
            token.querySelector('.speak-icon').onclick = (e) => { e.stopPropagation(); speakText(w); };
            token.onclick = (e) => { if (e.target.classList.contains('speak-icon')) return; addToBuilder(w); };
            bankGrid.appendChild(token);
        });
        if (!remainingWords.length) bankGrid.innerHTML = '<div style="color:#94a3b8; grid-column:span 2; text-align:center;">✅ Hết từ</div>';
        
        const builderInner = document.getElementById('sentenceBuilderInner'); builderInner.innerHTML = '';
        answerWords.forEach(w => {
            const token = document.createElement('div'); token.className = 'word-token used';
            token.innerHTML = `${escapeHtml(w)} <span class="speak-icon">🔊</span>`;
            token.querySelector('.speak-icon').onclick = (e) => { e.stopPropagation(); speakText(w); };
            token.onclick = (e) => { if (e.target.classList.contains('speak-icon')) return; addToBank(w); };
            builderInner.appendChild(token);
        });
        if (!answerWords.length) builderInner.innerHTML = '<div class="builder-placeholder">📌 Chạm từ bên trên để ghép</div>';
        initSortable();
        const scrollDiv = document.getElementById('builderScroll');
        if (scrollDiv) scrollDiv.scrollLeft = scrollDiv.scrollWidth;
    }
    function addToBuilder(w) { const i = remainingWords.indexOf(w); if (i !== -1) { remainingWords.splice(i,1); answerWords.push(w); renderGame(); } }
    function addToBank(w) { const i = answerWords.indexOf(w); if (i !== -1) { answerWords.splice(i,1); remainingWords.push(w); renderGame(); } }
    function readTokenText(el) {
        if (!el || el.classList.contains('builder-placeholder')) return '';
        return (el.childNodes[0]?.textContent || el.innerText || '').replace('🔊','').trim();
    }
    function syncAnswerWordsFromDOM() {
        const builder = document.getElementById('sentenceBuilderInner');
        if (!builder) return;
        const tokens = Array.from(builder.querySelectorAll('.word-token'))
            .map(readTokenText)
            .filter(Boolean);
        if (tokens.length) answerWords = tokens;
    }
    function initSortable() {
        if (sortableBank) sortableBank.destroy();
        if (sortableBuilder) sortableBuilder.destroy();
        const bank = document.getElementById('wordBank');
        const builder = document.getElementById('sentenceBuilderInner');
        if (!bank || !builder) return;

        sortableBank = new Sortable(bank, {
            group: { name: 'words', pull: 'clone', put: false, revertClone: true },
            sort: false,
            animation: 160,
            delay: 90,
            delayOnTouchOnly: true,
            touchStartThreshold: 5,
            fallbackOnBody: true,
            filter: '.speak-icon',
            onEnd: (evt) => {
                if (evt.to === builder) {
                    const text = readTokenText(evt.item);
                    evt.item.remove();
                    const idx = remainingWords.indexOf(text);
                    if (idx !== -1) {
                        remainingWords.splice(idx, 1);
                        answerWords.push(text);
                        renderGame();
                    }
                }
            }
        });

        sortableBuilder = new Sortable(builder, {
            group: { name: 'words', pull: true, put: true },
            sort: true,
            animation: 160,
            delay: 90,
            delayOnTouchOnly: true,
            touchStartThreshold: 5,
            fallbackOnBody: true,
            filter: '.speak-icon,.builder-placeholder',
            onEnd: (evt) => {
                if (evt.to === bank) {
                    const text = readTokenText(evt.item);
                    evt.item.remove();
                    const idx = answerWords.indexOf(text);
                    if (idx !== -1) {
                        answerWords.splice(idx, 1);
                        remainingWords.push(text);
                    }
                    renderGame();
                    return;
                }
                if (evt.from === builder && evt.to === builder) {
                    syncAnswerWordsFromDOM();
                }
            }
        });
    }
    function resetGame() { if (!currentQuestionObj) return; remainingWords = shuffleArray([...currentQuestionObj.words]); answerWords = []; document.getElementById("answerRevealBox").classList.add("hidden"); renderGame(); showToast("Đã làm lại", "correct"); }
    
    function checkAnswer() {
        syncAnswerWordsFromDOM();
        if (!currentStudent || !currentQuestionObj) return;
        const correct = currentQuestionObj.words;
        if (answerWords.length !== correct.length) { showToast(`Cần đủ ${correct.length} từ`, "wrong"); return; }
        let ok = true; for (let i=0; i<correct.length; i++) if (answerWords[i] !== correct[i]) { ok = false; break; }
        const cn = currentStudent.className, sn = currentStudent.studentName;
        if (!progress[cn]) progress[cn] = {};
        if (!progress[cn][sn]) progress[cn][sn] = {};
        if (!progress[cn][sn][currentExerciseId]) progress[cn][sn][currentExerciseId] = {};
        const qid = currentQuestionObj.id;
        if (!progress[cn][sn][currentExerciseId][qid]) progress[cn][sn][currentExerciseId][qid] = { completed:0, correct:false, startTime:new Date() };
        const rec = progress[cn][sn][currentExerciseId][qid];
        if (rec.correct === true && !ok) { resetQuestionIfWasCorrect(qid); loadQuestion(currentQuestionIndex); return; }
        if (rec.correct) { showToast("Câu này đã đúng rồi!", "correct"); document.getElementById('answerRevealBox').classList.remove('hidden'); return; }
        if (ok) {
            rec.correct = true; rec.endTime = new Date(); saveToCloud();
            showToast("🎉 Chính xác!", "correct");
            document.getElementById('correctAnswerText').innerText = currentQuestionObj.text;
            document.getElementById('meaningText').innerText = currentQuestionObj.meaning || '';
            document.getElementById('explanationText').innerText = currentQuestionObj.explanation || '';
            document.getElementById('answerRevealBox').classList.remove('hidden');
            renderQButtons(exercises.find(e => e.id === currentExerciseId));
            if (currentQuestionIndex+1 >= exercises.find(e=>e.id===currentExerciseId).questions.length) setTimeout(()=>alert("🏆 Hoàn thành bài tập!"),300);
            return;
        }
        if (rec.completed < 3) {
            rec.completed++; saveToCloud();
            const remain = 3 - rec.completed;
            showToast(remain>0 ? `❌ Sai, còn ${remain}/3 lần` : "❌ Sai 3 lần! Xem đáp án", "wrong");
            const dots = document.getElementById('attemptDotsContainer'); dots.innerHTML = '';
            for (let i=0;i<3;i++) { const d = document.createElement('span'); d.className = 'attempt-dot'; if (i<rec.completed) d.classList.add('failed'); dots.appendChild(d); }
            if (rec.completed >= 3) {
                document.getElementById('correctAnswerText').innerText = currentQuestionObj.text;
                document.getElementById('meaningText').innerText = currentQuestionObj.meaning || '';
                document.getElementById('explanationText').innerText = currentQuestionObj.explanation || '';
                document.getElementById('answerRevealBox').classList.remove('hidden');
            } else document.getElementById('answerRevealBox').classList.add('hidden');
            renderQButtons(exercises.find(e => e.id === currentExerciseId));
        } else {
            showToast("Bạn đã sai 3 lần, đáp án hiện bên dưới.", "wrong");
            document.getElementById('answerRevealBox').classList.remove('hidden');
        }
    }
    function renderQButtons(ex) {
        const container = document.getElementById('questionButtons'); if (!container) return;
        container.innerHTML = '';
        ex.questions.forEach((q, idx) => {
            const prog = progress[currentStudent.className]?.[currentStudent.studentName]?.[ex.id]?.[q.id];
            const done = prog?.correct;
            const revealed = prog?.completed>=3 && !done;
            const starred = isStarred(q.id);
            const wrapper = document.createElement('div'); wrapper.className = 'q-wrapper';
            wrapper.style.background = idx===currentQuestionIndex ? '#0f4c5c' : '#eef2ff';
            const btn = document.createElement('button'); btn.textContent = `${idx+1}${done?' ✓':revealed?' 👀':''}`;
            btn.style.background = 'transparent'; btn.style.border = 'none'; btn.style.fontWeight = 'bold'; btn.style.cursor = 'pointer'; btn.style.fontSize = '0.8rem';
            btn.style.color = idx===currentQuestionIndex ? 'white' : '#0f172a';
            btn.onclick = () => loadQuestion(idx);
            const star = document.createElement('span'); star.className = 'q-star'; star.textContent = starred ? '★' : '☆';
            star.onclick = (e) => { e.stopPropagation(); setStarred(q.id, !starred); renderQButtons(ex); showToast(starred ? 'Bỏ đánh dấu' : 'Đã đánh dấu câu khó', 'correct'); };
            wrapper.appendChild(btn); wrapper.appendChild(star); container.appendChild(wrapper);
        });
        if (container.children[currentQuestionIndex]) {
            container.children[currentQuestionIndex].scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
        }
    }
    function goNext() { const ex = exercises.find(e => e.id === currentExerciseId); if (ex && currentQuestionIndex < ex.questions.length-1) loadQuestion(currentQuestionIndex+1); else showToast("Đã là câu cuối", "correct"); }
    function goPrev() { if (currentQuestionIndex > 0) loadQuestion(currentQuestionIndex-1); else showToast("Đã là câu đầu", "correct"); }

    function openEditQuestions(exId) { 
        const ex = exercises.find(e => e.id === exId); 
        if (!ex) return; 
        const modal = document.createElement('div'); 
        modal.className = 'modal'; 
        let qHtml = ''; 
        ex.questions.forEach((q, i) => { 
            qHtml += `<div style="border:1px solid #ccc;padding:8px;border-radius:1rem;margin-bottom:8px;"><label>Câu ${i+1}:</label><input type="text" class="editQText" data-qid="${q.id}" value="${escapeHtml(q.text)}"><input type="text" class="editQMeaning" data-qid="${q.id}" value="${escapeHtml(q.meaning||'')}" placeholder="Dịch nghĩa"><input type="text" class="editQGrammar" data-qid="${q.id}" value="${escapeHtml(q.grammar||'')}" placeholder="Gợi ý"><input type="text" class="editQExplanation" data-qid="${q.id}" value="${escapeHtml(q.explanation||'')}" placeholder="Giải thích"><button class="btn deleteQBtn" data-qid="${q.id}" style="background:#ffebee;color:#c62828;">🗑️</button></div>`; 
        }); 
        modal.innerHTML = `<div class="modal-content"><h3>Sửa: ${escapeHtml(ex.title)}</h3><div style="max-height:400px;overflow-y:auto;">${qHtml}</div><div class="flex-row"><button id="addNewQBtn" class="btn btn-outline">➕ Thêm</button><button id="cancelEditQBtn" class="btn btn-outline">Hủy</button><button id="saveEditQBtn" class="btn btn-primary">Lưu</button></div></div>`; 
        document.body.appendChild(modal); 
        document.getElementById('cancelEditQBtn').onclick = () => modal.remove(); 
        document.getElementById('addNewQBtn').onclick = () => { 
            ex.questions.push({ id: Date.now() + Math.random(), text: '', meaning: '', grammar: '', explanation: '', words: [] }); 
            modal.remove(); 
            openEditQuestions(exId); 
        }; 
        document.getElementById('saveEditQBtn').onclick = () => { 
            document.querySelectorAll('.editQText').forEach(inp => { 
                const q = ex.questions.find(q => q.id === Number(inp.dataset.qid)); 
                if (q) q.text = inp.value.trim(); 
            }); 
            document.querySelectorAll('.editQMeaning').forEach(inp => { 
                const q = ex.questions.find(q => q.id === Number(inp.dataset.qid)); 
                if (q) q.meaning = inp.value.trim(); 
            }); 
            document.querySelectorAll('.editQGrammar').forEach(inp => { 
                const q = ex.questions.find(q => q.id === Number(inp.dataset.qid)); 
                if (q) q.grammar = inp.value.trim(); 
            }); 
            document.querySelectorAll('.editQExplanation').forEach(inp => { 
                const q = ex.questions.find(q => q.id === Number(inp.dataset.qid)); 
                if (q) q.explanation = inp.value.trim(); 
            }); 
            ex.questions.forEach(q => { if (q.text) q.words = q.text.split(/\s+/); else q.words = []; }); 
            saveToCloud(); 
            renderTeacher(); 
            modal.remove(); 
            showToast("Cập nhật", "correct"); 
        }; 
        document.querySelectorAll('.deleteQBtn').forEach(btn => { 
            btn.onclick = function() { 
                if (confirm("Xóa câu?")) { 
                    this.dataset.toDelete = 'true'; 
                    this.closest('div').style.opacity = '0.4'; 
                    this.disabled = true; 
                } 
            }; 
        }); 
    }
    function openBatchImport(exId) { 
        const ex = exercises.find(e => e.id === exId); 
        if (!ex) return; 
        const modal = document.createElement('div'); 
        modal.className = 'modal'; 
        modal.innerHTML = `<div class="modal-content"><h3>📋 Nhập hàng loạt: ${escapeHtml(ex.title)}</h3><p>Cú pháp: câu | gợi ý | giải thích | dịch nghĩa</p><textarea id="batchLines" rows="12" style="width:100%;"></textarea><div class="flex-row"><button id="cancelBatch" class="btn btn-outline">Hủy</button><button id="confirmBatch" class="btn btn-primary">Thêm</button></div></div>`; 
        document.body.appendChild(modal); 
        document.getElementById('cancelBatch').onclick = () => modal.remove(); 
        document.getElementById('confirmBatch').onclick = () => { 
            const lines = document.getElementById('batchLines').value.split(/\r?\n/); 
            let added = 0; 
            for (let line of lines) { 
                line = line.trim(); 
                if (!line) continue; 
                let parts = line.split('|').map(s => s.trim()); 
                let text = parts[0]; 
                if (!text) continue; 
                let grammar = parts[1] || ''; 
                let explanation = parts[2] || ''; 
                let meaning = parts[3] || ''; 
                let words = text.split(/\s+/); 
                if (words.length >= 2) { 
                    ex.questions.push({ id: Date.now() + Math.random(), text, words, grammar, explanation, meaning }); 
                    added++; 
                } 
            } 
            if (added) { 
                saveToCloud(); 
                renderTeacher(); 
                showToast(`Đã thêm ${added} câu`, "correct"); 
                modal.remove(); 
            } else alert("Không có câu hợp lệ"); 
        }; 
    }
    function renderProgressTable() { 
        const container = document.getElementById('progressTable'); 
        if (!classes.length) { container.innerHTML = 'Chưa có lớp'; return; } 
        let html = '<button id="exportExcelBtn" class="btn btn-outline" style="margin-bottom:12px;">📎 Xuất Excel</button><canvas id="statsChart" width="400" height="200"></canvas><div style="overflow-x:auto;"><table style="width:100%; border-collapse:collapse;"><thead><tr><th>Lớp</th><th>HS</th><th>Bài</th><th>Đúng/Tổng</th></tr></thead><tbody>'; 
        classes.forEach(cls => { 
            cls.students.forEach(stu => { 
                const pStu = progress[cls.name]?.[stu.name] || {}; 
                cls.exerciseIds.forEach(eid => { 
                    const ex = exercises.find(e => e.id === eid); 
                    if (ex) { 
                        let correct = 0; 
                        const pEx = pStu[eid] || {}; 
                        ex.questions.forEach(q => { if (pEx[q.id]?.correct) correct++; }); 
                        html += `<td><td>${escapeHtml(cls.name)}</td><td>${escapeHtml(stu.name)}</td><td>${escapeHtml(ex.title)}</td><td>${correct}/${ex.questions.length}</td></tr>`; 
                    } 
                }); 
            }); 
        }); 
        html += '</tbody></table></div>'; 
        container.innerHTML = html; 
        const ctx = document.getElementById('statsChart')?.getContext('2d'); 
        if (ctx) { 
            const stats = {}; 
            classes.forEach(cls => { 
                cls.students.forEach(stu => { 
                    const key = `${cls.name} - ${stu.name}`; 
                    let cor = 0, tot = 0; 
                    const pStu = progress[cls.name]?.[stu.name] || {}; 
                    cls.exerciseIds.forEach(eid => { 
                        const ex = exercises.find(e => e.id === eid); 
                        if (ex) { 
                            const pEx = pStu[eid] || {}; 
                            ex.questions.forEach(q => { tot++; if (pEx[q.id]?.correct) cor++; }); 
                        } 
                    }); 
                    stats[key] = cor; 
                }); 
            }); 
            if (window.chartInstance) window.chartInstance.destroy(); 
            window.chartInstance = new Chart(ctx, { type: 'bar', data: { labels: Object.keys(stats), datasets: [{ label: 'Số câu đúng', data: Object.values(stats), backgroundColor: '#16a34a' }] }, options: { responsive: true } }); 
        } 
        document.getElementById('exportExcelBtn')?.addEventListener('click', () => { 
            let rows = [["Lớp", "Học sinh", "Bài tập", "Đúng", "Tổng", "Tỉ lệ"]]; 
            classes.forEach(cls => { 
                cls.students.forEach(stu => { 
                    const pStu = progress[cls.name]?.[stu.name] || {}; 
                    cls.exerciseIds.forEach(eid => { 
                        const ex = exercises.find(e => e.id === eid); 
                        if (ex) { 
                            let cor = 0; 
                            const pEx = pStu[eid] || {}; 
                            ex.questions.forEach(q => { if (pEx[q.id]?.correct) cor++; }); 
                            rows.push([cls.name, stu.name, ex.title, cor, ex.questions.length, ((cor / ex.questions.length) * 100).toFixed(1) + "%"]); 
                        } 
                    }); 
                }); 
            }); 
            const csv = rows.map(r => r.join(",")).join("\n"); 
            const blob = new Blob(["\uFEFF" + csv], { type: "text/csv" }); 
            const link = document.createElement("a"); 
            link.href = URL.createObjectURL(blob); 
            link.download = "progress.csv"; 
            link.click(); 
        }); 
    }
    async function renderLoginLogs() { 
        const c = document.getElementById('monitorLogs'); 
        c.innerHTML = 'Đang tải...'; 
        try { 
            const snap = await db.collection('detailed_logs').orderBy('timestamp', 'desc').limit(100).get(); 
            if (snap.empty) { c.innerHTML = 'Chưa có log.'; return; } 
            let h = ''; 
            snap.forEach(doc => { 
                const log = doc.data(); 
                const start = log.startTime?.toDate().toLocaleString('vi-VN') || '?'; 
                const end = log.endTime?.toDate().toLocaleString('vi-VN') || '?'; 
                h += `<div class="item-card"><div>👤 ${escapeHtml(log.studentName)} 📘 Ex${log.exerciseId} ❓${log.questionId}</div><div>⏰ ${start} → ${end}</div><div>${log.correct ? '✅ Đúng' : '❌ Sai'}</div></div>`; 
            }); 
            c.innerHTML = h; 
        } catch(e) { c.innerHTML = 'Lỗi tải log'; } 
    }
    async function loadAllowedEmails() { 
        try { 
            const snap = await db.collection('allowed_emails').get(); 
            const container = document.getElementById('allowedEmailsList'); 
            container.innerHTML = ''; 
            snap.forEach(doc => { 
                const d = doc.data(); 
                const div = document.createElement('div'); 
                div.className = 'item-card'; 
                div.innerHTML = `<div><strong>${doc.id}</strong><br><span style="font-size:0.7rem;">${d.role === 'teacher' ? 'Giáo viên' : `HS: ${d.studentName || '?'} - Lớp: ${d.className || '?'}`}</span></div><button class="btn remove-email" data-email="${doc.id}" style="color:#c62828;">❌</button>`; 
                container.appendChild(div); 
            }); 
            document.querySelectorAll('.remove-email').forEach(btn => btn.onclick = async () => { 
                if (btn.dataset.email === currentUser.email) return alert("Không xóa chính mình"); 
                if (confirm("Xóa email khỏi danh sách?")) { 
                    await db.collection('allowed_emails').doc(btn.dataset.email).delete(); 
                    loadAllowedEmails(); 
                } 
            }); 
        } catch(e) {} 
    }

    // Gắn sự kiện
    document.getElementById('checkBtn').onclick = checkAnswer;
    document.getElementById('resetGameBtn').onclick = resetGame;
    document.getElementById('nextQuestionBtn').onclick = goNext;
    document.getElementById('prevQuestionBtn').onclick = goPrev;
    document.getElementById('speakAnswerBtn').onclick = () => { const t = document.getElementById('correctAnswerText').innerText; if (t) speakText(t); };
    document.getElementById('syncToCloudBtn').onclick = saveToCloud;
    document.getElementById('exportDataBtn').onclick = () => { const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([JSON.stringify({ classes, exercises, progress })], { type: 'application/json' })); a.download = 'config.json'; a.click(); };
    document.getElementById('importDataBtn').onclick = () => { const inp = document.createElement('input'); inp.type = 'file'; inp.accept = '.json'; inp.onchange = e => { const f = e.target.files[0]; if (!f) return; const r = new FileReader(); r.onload = ev => { try { const d = JSON.parse(ev.target.result); if (d.classes && d.exercises) { classes = d.classes; exercises = d.exercises; progress = d.progress || {}; normalize(); saveToCloud(); renderTeacher(); if (!isTeacher && currentStudent) loadStudentExercises(); showToast("Nhập thành công!", "correct"); } else alert("Sai định dạng"); } catch(err) { alert(err); } }; r.readAsText(f); }; inp.click(); };
    document.getElementById('addClassBtn').onclick = () => { const n = document.getElementById('newClassName').value.trim(); if (!n) return; classes.push({ id: Date.now(), name: n, students: [], exerciseIds: [] }); saveToCloud(); renderTeacher(); document.getElementById('newClassName').value = ''; };
    document.getElementById('deleteClassBtn').onclick = () => { if (!currentSelectedClassId) return; if (confirm("Xóa lớp?")) { classes = classes.filter(c => c.id !== currentSelectedClassId); currentSelectedClassId = null; saveToCloud(); renderTeacher(); } };
    document.getElementById('addStudentToClassBtn').onclick = async () => { if (!currentSelectedClassId) return alert("Chọn lớp"); const email = document.getElementById('newStudentEmail').value.trim(); const name = document.getElementById('newStudentName').value.trim(); if (!email || !name) return; const cls = classes.find(c => c.id === currentSelectedClassId); const allowedRef = db.collection('allowed_emails').doc(email); const snap = await allowedRef.get(); if (!snap.exists) await allowedRef.set({ role: 'student', studentName: name, className: cls.name }); else await allowedRef.update({ studentName: name, className: cls.name }); if (!cls.students.find(s => s.email === email)) cls.students.push({ email, name }); saveToCloud(); renderTeacher(); document.getElementById('newStudentEmail').value = ''; document.getElementById('newStudentName').value = ''; showToast(`Đã thêm ${name}`, 'correct'); };
    document.getElementById('assignExerciseBtn').onclick = () => { if (!currentSelectedClassId) return; const eid = parseInt(document.getElementById('exerciseAssignSelect').value); if (!eid) return; const cls = classes.find(c => c.id === currentSelectedClassId); if (!cls.exerciseIds.includes(eid)) cls.exerciseIds.push(eid); saveToCloud(); renderTeacher(); if (!isTeacher && currentStudent) loadStudentExercises(); };
    document.getElementById('addExerciseBtn').onclick = () => { const t = document.getElementById('newExerciseTitle').value.trim(); if (!t) return; exercises.push({ id: Date.now(), title: t, questions: [] }); saveToCloud(); renderTeacher(); document.getElementById('newExerciseTitle').value = ''; };
    document.getElementById('inviteStudentBtn').onclick = async () => { const email = document.getElementById('inviteEmail').value.trim(); const name = document.getElementById('inviteStudentName').value.trim(); if (!email || !name) return alert("Nhập email và tên"); await db.collection('allowed_emails').doc(email).set({ role: 'student', studentName: name, className: '' }); document.getElementById('inviteEmail').value = ''; document.getElementById('inviteStudentName').value = ''; loadAllowedEmails(); showToast(`Đã mời ${email}`, 'correct'); };
    document.getElementById('addAnotherTeacherBtn').onclick = async () => { const email = prompt("Email giáo viên:"); if (email) { await db.collection('allowed_emails').doc(email).set({ role: 'teacher' }); loadAllowedEmails(); } };
    (async () => { try { const snap = await db.collection('allowed_emails').where('role', '==', 'teacher').get(); if (snap.empty) await db.collection('allowed_emails').doc('doluc651@gmail.com').set({ role: 'teacher' }); } catch(e) {} })();
</script>
